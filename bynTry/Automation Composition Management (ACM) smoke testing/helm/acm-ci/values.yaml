image:
  repository: your-docker-repo/acm-xtesting
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

onap:
  host: http://onap-clamp:8080
  username: admin
  password: admin

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
